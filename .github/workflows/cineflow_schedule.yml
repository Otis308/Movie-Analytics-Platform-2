name: CineFlow Automated Data Pipeline

# Cấu hình thời gian chạy tự động
on:
  schedule:
    # Chạy vào lúc 00:00 UTC (tức 7:00 sáng giờ Việt Nam) mỗi ngày
    - cron: '0 0 * * *'
  # Cho phép bạn bấm nút "chạy bằy tay" trên giao diện GitHub bất cứ lúc nào để test
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest # Bật một máy chủ Ubuntu ảo miễn phí của GitHub

    steps:
    # Bước 1: Tải mã nguồn của bạn về máy chủ ảo
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt Python môi trường sạch
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Bước 3: Cài đặt các thư viện cần thiết (DLT, DBT, psycopg2...)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests dlt[postgres] dbt-core dbt-postgres

    # Bước 4: Chạy file Python trực tiếp vì nó đang ở thư mục gốc
    - name: Run Extract & Load Pipeline
      env:
        TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python ./movie-analytics-platform/main.py

    # Bước 5: cd thẳng vào cineflow_dbt
    - name: Run dbt Transformation
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        cd cineflow_dbt
        dbt run --profiles-dir .