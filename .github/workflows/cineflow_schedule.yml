name: CineFlow Automated Data Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv dlt[postgres] dbt-core dbt-postgres

    - name: Run Extract & Load Pipeline
      env:
        TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python main.py

    - name: Run dbt Transformation
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        cd cineflow_dbt
        dbt run --profiles-dir .
